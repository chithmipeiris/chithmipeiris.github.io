name: Deploy to GitHub Pages

on:
  # Run on every push to the main branch.
  push:
    branches: [main]
  # Allow manually triggering from the Actions tab.
  workflow_dispatch:

# Permissions the GITHUB_TOKEN needs to deploy to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        # Ensures GitHub Pages is enabled/initialised for this repo before
        # deploying, and exposes the resolved base_path to the build.
        id: pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Build Astro site
        uses: withastro/action@v3
        # Reads package.json, installs deps, runs `astro build`,
        # and uploads ./dist as the Pages artifact.

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
