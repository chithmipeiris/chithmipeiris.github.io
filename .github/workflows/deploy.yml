name: Deploy to GitHub Pages

on:
  # Run on every push to the main branch.
  push:
    branches: [main]
  # Allow manually triggering from the Actions tab.
  workflow_dispatch:

# Permissions the GITHUB_TOKEN needs to deploy to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # Security gate: audits dependencies for high/critical vulnerabilities on a
  # clean, lockfile-based install. TEMPORARY: continue-on-error keeps the audit
  # non-blocking (it reports red but does not stop deploys) because of the known
  # high `astro` advisory that requires a breaking Astro 5->7 upgrade. Once that
  # upgrade is merged and verified, remove `continue-on-error` to make it a hard
  # gate again.
  audit:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies from lockfile
        run: npm ci
      - name: Audit dependencies (high and above)
        run: npm audit --audit-level=high

  build:
    needs: audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Pages
        # Ensures GitHub Pages is enabled/initialised for this repo before
        # deploying, and exposes the resolved base_path to the build.
        id: pages
        uses: actions/configure-pages@v6
        with:
          enablement: true
      - name: Build Astro site
        uses: withastro/action@v6
        # Reads package.json, installs deps, runs `astro build`,
        # and uploads ./dist as the Pages artifact.

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
